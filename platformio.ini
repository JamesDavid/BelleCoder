; BelleCoder — CYD dance-programmer wand for the Hasbro Dance Code Belle doll.
;
; Multi-target by design (SPEC §2, Overhead precedent): every board variant is its own
; [env:*]; shared code is variant-agnostic and reads the pins + capability flags that the
; per-env build_flags pull in via src/hal/Board.h. Adding a board = a new env, not a fork.
;
; Build / flash the on-hand board (2.8" CYD on COM5):
;   pio run -e cyd28_ili9341
;   pio run -e cyd28_ili9341 -t upload
;   pio run -e cyd28_ili9341 -t uploadfs      (LittleFS image from data/)
;   pio device monitor -b 115200

[platformio]
default_envs = cyd28_ili9341

[env]
; Registry espressif32 2.0.x core — leaner on RAM than 3.x, matches the Overhead precedent
; for the no-PSRAM classic ESP32. The CrowPanel S3 env overrides this with pioarduino 3.x.
platform = espressif32 @ 6.9.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv    ; ~1.9 MB app (room for NimBLE) + small LittleFS

lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    bblanchon/ArduinoJson @ ^7

build_flags =
    -D BELLE_FW_VERSION=\"0.1.0\"
    -std=gnu++17
build_unflags = -std=gnu++11

; ---------------------------------------------------------------------------
; 2.8" CYD: ESP32-2432S028R, ILI9341 240x320 (driven landscape-native 320x240 at
; MV=0 / rotation 6), XPT2046 touch on a SEPARATE VSPI bus, no PSRAM. The board on
; hand (COM5). Pinout + quirks: ../BladeAir/cyd.md + Overhead hal/Board.h.
; ---------------------------------------------------------------------------
[env:cyd28_ili9341]
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_CYD28_ILI9341=1
    ; single-USB (micro-USB) variants want 0; dual-USB (USB-C) want 1 (cyd.md)
    -D CYD_INVERT_DISPLAY=0

; ---------------------------------------------------------------------------
; CrowPanel Advance S3 5.0-HMI: ESP32-S3, 8 MB PSRAM, 800x480 parallel-RGB (ST7262),
; GT911 capacitive touch. Identical BLE half; only the display/touch HAL branch differs.
; Uses the pioarduino 3.x platform for the S3 esp_lcd RGB driver. (Bring-up deferred;
; the env + HAL branch exist so it's a new target, not a fork.)
; ---------------------------------------------------------------------------
[env:crowpanel_s3_5hmi]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size  = 16MB
board_build.psram_type  = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -D BOARD_CROWPANEL_S3_5HMI=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
